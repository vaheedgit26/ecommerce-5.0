apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend
  #namespace: ecommerce
  labels:
    project: ecommerce
    tier: frontend
    component: frontend
data:
  ecommerce.conf: |
    # This is working perfectly
    # This should be placed in /etc/nginx/conf.d/ecommerce.conf

    server {

        listen 8080 default_server;  # Treated as default server for every request
        server_name _;

        proxy_http_version 1.1;

        #location / {
        #    root   /usr/share/nginx/html;
        #    index  index.html index.htm;
        #    ssi    on;
        #}  

        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri /index.html;
        }

        location /api/products {

            proxy_pass         http://product-service:8001/products;   # product service name
        
            proxy_redirect     off;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Host $server_name;

        }

        location /api/cart {

            proxy_pass         http://cart-service:8002/cart;   # cart service name
        
            proxy_redirect     off;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Host $server_name;

        }
        
        # Health check for NGINX (static page or simple response)
        location /nginx-health {
            return 200 "NGINX is healthy!";
            add_header Content-Type text/plain;
        } 

        # Nginx Status
        location /nginx-status {
            stub_status on;              # Enable stub_status module
            #allow 127.0.0.1;            # Allow requests from localhost  # 192.168.1.0/24
            #deny all;                   # Deny all other IPs
        }

    } 
